apiVersion: apps/v1
kind: Deployment
metadata: { name: metascrub, labels: { app: metascrub } }
spec:
  replicas: 1
  selector: { matchLabels: { app: metascrub } }
  template:
    metadata: { labels: { app: metascrub } }
    spec:
      containers:
        - name: metascrub
          image: ghcr.io/cognis-digital/metascrub:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: metascrub }
spec:
  selector: { app: metascrub }
  ports: [{ port: 80, targetPort: 8000 }]
